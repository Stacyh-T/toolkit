# ============================================================
#   tmux.conf — Cybersecurity Toolkit
# ============================================================

# Changer le prefix de Ctrl+b à Ctrl+a (plus accessible)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Recharger la config sans redémarrer
bind r source-file ~/.tmux.conf \; display "Config rechargée ✓"

# Splits intuitifs
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigation entre panes avec Alt+flèches
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Redimensionner les panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Nouvelle fenêtre dans le dossier courant
bind c new-window -c "#{pane_current_path}"

# Numérotation à partir de 1
set -g base-index 1
setw -g pane-base-index 1

# Historique plus long
set -g history-limit 50000

# Souris activée
set -g mouse on

# Couleurs
set -g default-terminal "screen-256color"

# ── BARRE DE STATUT ──────────────────────────────────────────
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left '#[fg=colour226,bold] ⚡ #S '
set -g status-right '#[fg=colour226]%H:%M #[fg=colour82]%d/%m/%Y'
set -g status-right-length 50
set -g status-left-length 30

setw -g window-status-current-format '#[fg=colour81,bold] #I:#W '
setw -g window-status-format '#[fg=colour244] #I:#W '
